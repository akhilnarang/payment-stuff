{% extends "base.html" %}
{% block title %}QR — {{ info.bank_name }}{% endblock %}
{% block content %}
<h1>{{ info.bank_name }}</h1>
<div class="card" style="text-align: center;">
  <img src="{{ qr_data_uri }}" alt="UPI QR Code" style="max-width: 100%; height: auto;">
  <hr>
  <p>VPA: <code>{{ info.vpa }}</code></p>
  {% if am %}
  <p>Amount: <code>{{ am }}</code></p>
  {% endif %}
  {% if tn %}
  <p>Note: <code>{{ tn }}</code></p>
  {% endif %}
</div>
<p><a href="{{ url_for('bank_page', bank_slug=slug) }}">&larr; Back</a></p>
{% endblock %}
